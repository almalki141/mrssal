<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مرسال | خدمات المتاجر الإلكترونية</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --gold: #b4874c;
      --gold-dark: #8e642f;
      --ink: #2f241b;
      --line: #e8d8c2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      direction: rtl;
      text-align: right;
    }
    .container {
      width: min(1180px, calc(100% - 32px));
      margin: auto;
    }
    header {
      position: sticky;
      top: 0;
      background: rgba(251,247,239,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }
    .brand img {
      width: 140px;
      height: auto;
    }
    .navlinks {
      display: flex;
      gap: 24px;
      font-weight: bold;
    }
    .navlinks a {
      text-decoration: none;
      color: var(--ink);
    }
    .navlinks a:hover {
      color: var(--gold-dark);
    }
    .btn-wa {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
    }
    .hero {
      padding: 80px 0;
      background: var(--bg);
    }
    .hero .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      margin: 0;
    }
    .hero p {
      font-size: 1.2rem;
      color: rgba(47,36,27,0.8);
      margin: 16px 0;
    }
    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--gold-dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .btn-light {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--gold-dark);
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="#top"><img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTYwIiBoZWlnaHQ9Ijc2IiB2aWV3Qm94PSIwIDAgMTYwIDc2IiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjx0ZXh0IHg9IjAiIHk9IjUwJSIgZm9udC1mYW1pbHk9IlRhaG9tYSwgQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNjAiIGZpbGw9IiMyZjI0MWIiPk1lcnNhbDwvdGV4dD48L3N2Zz4=" alt="مرسال"></a>
      <nav class="navlinks">
        <a href="#services">الخدمات</a>
        <a href="#packages">الباقات</a>
        <a href="#contact">تواصل</a>
      </nav>
      <a class="btn-wa" href="https://wa.me/966531587416?text=مرحباً، أرغب في الاستفسار">واتساب</a>
    </div>
  </header>

  <section class="hero" id="top">
    <div class="container">
      <h1>كل ما تحتاجه لمتجرك في مكان واحد</h1>
      <p>من تأسيس وإدارة المتاجر إلى الحملات الإعلانية وتحسين محركات البحث.</p>
      <div class="hero-actions">
        <a class="btn-primary" href="#services">استعرض الخدمات</a>
        <a class="btn-light" href="#contact">تواصل معنا</a>
      </div>
    </div>
  </section>
</body>
</html>
