<!doctype html>
<html lang="ar" dir="rtl">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>مرسال | خدمات المتاجر الإلكترونية</title>
 <meta name="description" content="كل خدمات متجرك الإلكتروني في مكان واحد: تأسيس المتاجر، الإدارة، الحملات الإعلانية، السوشيال ميديا، SEO وخدمات Google.">
 <style>
 :root {
 --bg:#fbf7ef;
 --surface:#fffdf9;
 --surface-2:#f6eddf;
 --gold:#b4874c;
 --gold-dark:#8e642f;
 --ink:#2f241b;
 --muted:#746558;
 --line:#e8d8c2;
 --shadow:0 18px 55px rgba(68,45,24,.10);
 --radius:26px;
 }
 *{box-sizing:border-box}
 html{scroll-behavior:smooth}
 body{
 margin:0;
 font-family:Tahoma,Arial,sans-serif;
 color:var(--ink);
 background:
 radial-gradient(circle at 8% 4%,rgba(180,135,76,.11),transparent 25%),
 radial-gradient(circle at 92% 18%,rgba(180,135,76,.08),transparent 24%),
 var(--bg);
 line-height:1.8;
 }
 a{color:inherit}
 img{max-width:100%;display:block}
 .container{width:min(1180px,calc(100% - 32px));margin:auto}
 .topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(251,247,239,.9);border-bottom:1px solid rgba(232,216,194,.8);}
 .nav{min-height:78px;display:flex;align-items:center;justify-content:space-between;gap:24px}
 .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
 .brand img{width:154px;height:70px;object-fit:contain;border-radius:14px}
 .navlinks{display:flex;align-items:center;gap:23px;font-weight:700;font-size:14px}
 .navlinks a{text-decoration:none}
 .navlinks a:hover{color:var(--gold-dark)}
 .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:50px;padding:0 22px;border:0;border-radius:15px;text-decoration:none;font-weight:900;cursor:pointer;transition:.25s ease;}
 .btn:hover{transform:translateY(-2px)}
 .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;box-shadow:0 12px 28px rgba(142,100,47,.22)}
 .btn-light{background:#fff;border:1px solid var(--line);color:var(--gold-dark)}
 .hero{padding:74px 0 58px}
 .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:55px}
 .eyebrow{display:inline-flex;padding:8px 16px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--gold-dark);font-weight:900;font-size:14px}
 h1{font-size:clamp(40px,6vw,72px);line-height:1.18;margin:18px 0 16px;letter-spacing:-1.5px}
 .hero p{font-size:19px;color:var(--muted);margin:0 0 28px;max-width:680px}
 .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
 .proof{display:flex;gap:22px;flex-wrap:wrap;margin-top:30px}
 .proof div{display:flex;align-items:center;gap:8px;color:#5a493b;font-weight:700}
 .proof b{color:var(--gold-dark)}
 .hero-visual{position:relative;min-height:490px;border:1px solid var(--line);border-radius:34px;background:linear-gradient(145deg,#fffdf8,#f4e6d0);box-shadow:var(--shadow);overflow:hidden;padding:30px}
 .hero-visual:before{content:"";position:absolute;width:270px;height:270px;border-radius:50%;background:rgba(180,135,76,.11);top:-70px;left:-80px}
 .screen{position:relative;margin:54px auto 0;width:88%;border:10px solid #2d261f;border-radius:22px;background:#fff;box-shadow:0 28px 50px rgba(49,35,22,.22);overflow:hidden}
 .screen-top{height:30px;background:#eadcc8;display:flex;gap:7px;align-items:center;padding:0 12px}
 .screen-top i{width:8px;height:8px;border-radius:50%;background:var(--gold)}
 .screen-body{padding:18px}
 .screen-hero{height:112px;border-radius:14px;background:linear-gradient(135deg,#d6b483,#9a6b34);position:relative}
 .screen-hero:after{content:"مرسال لخدمات المتاجر";position:absolute;color:#fff;font-size:23px;font-weight:900;right:22px;top:26px}
 .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
 .mini-grid span{height:74px;background:#f3e8d7;border-radius:12px}
 .float-card{position:absolute;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 17px;box-shadow:0 16px 38px rgba(65,42,22,.14);font-weight:900;color:var(--gold-dark)}
 .float-a{right:18px;top:35px}
 .float-b{left:14px;bottom:28px}
 section{padding:62px 0}
 .section-head{text-align:center;max-width:760px;margin:0 auto 36px}
 .section-head h2{font-size:clamp(31px,4.6vw,48px);line-height:1.3;margin:8px 0}
 .section-head p{color:var(--muted);font-size:17px;margin:0}
 .services{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
 .service{position:relative;padding:27px;border-radius:var(--radius);background:rgba(255,253,249,.92);border:1px solid var(--line);box-shadow:0 12px 40px rgba(68,45,24,.07);transition:.25s ease}
 .service:hover{transform:translateY(-7px);box-shadow:var(--shadow)}
 .icon{width:62px;height:62px;border-radius:19px;display:grid;place-items:center;background:linear-gradient(145deg,#fff,#ead8bd);font-size:27px;margin-bottom:18px}
 .service h3{font-size:23px;margin:0 0 7px}
 .service p{color:var(--muted);font-size:15px;margin:0 0 16px}
 .service ul{margin:0 0 20px;padding:0;list-style:none}
 .service li{padding:7px 26px 7px 0;position:relative;font-size:14px}
 .service li:before{content:"✓";position:absolute;right:0;color:var(--gold-dark);font-weight:900}
 .text-link{font-weight:900;color:var(--gold-dark);text-decoration:none}
 .tabs{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:28px}
 .tab{border:1px solid var(--line);background:#fff;padding:11px 18px;border-radius:999px;font:inherit;font-weight:900;color:var(--ink);cursor:pointer}
 .tab.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border-color:transparent}
 .packages{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
 .package{display:flex;flex-direction:column;padding:28px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:0 14px 45px rgba(68,45,24,.08)}
 .package.featured{border:2px solid var(--gold);transform:translateY(-10px)}
 .pkg-tag{color:var(--gold-dark);font-weight:900;font-size:13px}
 .package h3{font-size:25px;margin:4px 0 5px}
 .price{font-size:39px;font-weight:900;color:var(--gold-dark);line-height:1.2;margin:9px 0 14px}
 .price small{font-size:14px;color:var(--muted)}
 .package p{color:var(--muted);font-size:14px}
 .package ul{padding:0;margin:8px 0 22px;list-style:none;flex:1}
 .package li{border-bottom:1px solid #f1e6d7;padding:9px 25px 9px 0;position:relative;font-size:14px}
 .package li:before{content:"✓";position:absolute;right:0;color:var(--gold-dark);font-weight:bold}
 .catalog{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
 .catalog-card{padding:20px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.86);text-decoration:none;transition:.2s ease}
 .catalog-card:hover{transform:translateY(-4px);border-color:var(--gold)}
 .catalog-card strong{display:block;font-size:17px;margin-bottom:4px}
 .catalog-card span{color:var(--gold-dark);font-weight:900}
 .why{display:grid;grid-template-columns:.85fr 1.15fr;gap:35px;align-items:center}
 .why-panel{min-height:430px;border:1px solid var(--line);border-radius:34px;background:linear-gradient(145deg,#f4e5cf,#fff);display:grid;place-items:center;box-shadow:var(--shadow);padding:30px;text-align:center}
 .why-panel .big{font-size:74px;font-weight:900;color:var(--gold-dark);line-height:1}
 .why-panel p{font-size:19px;color:var(--muted)}
 .why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
 .why-item{padding:20px;border:1px solid var(--line);border-radius:19px;background:#fff}
 .why-item b{display:block;font-size:18px;margin-bottom:4px}
 .why-item span{color:var(--muted);font-size:14px}
 .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:17px}
 .step{padding:24px;border-radius:22px;background:#fff;border:1px solid var(--line);text-align:center}
 .step em{display:grid;place-items:center;width:48px;height:48px;border-radius:50%;background:var(--surface-2);color:var(--gold-dark);font-style:normal;font-weight:900;margin:0 auto 12px}
 .cta{padding:42px;border-radius:34px;background:linear-gradient(135deg,#b4874c,#815824);color:#fff;display:grid;grid-template-columns:1fr auto;gap:25px;align-items:center;box-shadow:var(--shadow)}
 .cta h2{font-size:36px;margin:0 0 7px}
 .cta p{margin:0;color:#fff5e9}
 .cta .btn{background:#fff;color:var(--gold-dark)}
 .faq{max-width:860px;margin:auto}
 details{background:#fff;border:1px solid var(--line);border-radius:17px;margin-bottom:11px;padding:16px 19px}
 summary{font-weight:900;cursor:pointer}
 details p{color:var(--muted);margin:8px 0 0}
 footer{padding:32px 0 90px;text-align:center;color:var(--muted)}
 .wa-float{position:fixed;left:22px;bottom:22px;z-index:80;text-decoration:none;background:#1ea952;color:#fff;border-radius:999px;padding:14px 20px;font-weight:900;box-shadow:0 15px 35px rgba(11,99,47,.28)}
 @media (max-width:960px){.navlinks{display:none}.hero-grid,.why{grid-template-columns:1fr}.services,.packages{grid-template-columns:1fr}.catalog{grid-template-columns:repeat(2,1fr)}.steps{grid-template-columns:repeat(2,1fr)}.cta{grid-template-columns:1fr;text-align:center}}
 @media (max-width:600px){.hero{padding-top:42px}h1{font-size:42px}.hero-visual{min-height:380px;padding:15px}.float-card{font-size:12px}.services,.packages,.why-grid,.catalog,.steps{grid-template-columns:1fr}section{padding:48px 0}.brand img{width:120px}.cta{padding:28px 20px}.cta h2{font-size:28px}.wa-float{left:14px;right:14px;text-align:center}}
 </style>
</head>
